[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm --filter @priority-crm/database exec prisma generate && cd apps/api && pnpm build"

[deploy]
startCommand = "node dist/main"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
